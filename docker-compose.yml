services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_APP_BASE_URL: ${NUXT_APP_BASE_URL:-/movement-studios/}
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost}
    image: movement-studios-app:latest
    container_name: movement-studios-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_APP_BASE_URL: ${NUXT_APP_BASE_URL:-/movement-studios/}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost}
    networks:
      - web

networks:
  web:
    external: true
    name: web
