# Сеть web: docker network create web
# Nginx MySite проксирует /movement-studio/ → movement-studios-app:3000/movement-studio/

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NUXT_PUBLIC_APP_BASEURL: ${NUXT_PUBLIC_APP_BASEURL:-/movement-studio/}
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost}
    image: movement-studios-app:latest
    container_name: movement-studios-app
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
      NUXT_PUBLIC_APP_BASEURL: ${NUXT_PUBLIC_APP_BASEURL:-/movement-studio/}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost}
    networks:
      - web

networks:
  web:
    external: true
    name: web
